  <style>
    :root {
      --ink: #202124;
      --muted: #676f7a;
      --accent: #6b7280;
      --ring: rgba(107, 114, 128, 0.22);
      --border: rgba(32, 33, 36, 0.12);
      --shadow: 0 10px 24px rgba(32, 33, 36, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Segoe UI", "Trebuchet MS", "Helvetica Neue", sans-serif;
      background: #ffffff;
    }

    .page {
      width: min(1000px, 92vw);
      margin: 20px auto 28px;
    }

    .hero {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
      padding: clamp(16px, 3vw, 28px);
      animation: fadeInUp 0.45s ease-out;
    }

    h1 {
      margin: 0;
      line-height: 1.1;
      letter-spacing: 0.2px;
      font-size: clamp(1.45rem, 4vw, 2.3rem);
    }

    .sub {
      margin: 8px 0 18px;
      color: var(--muted);
      font-size: clamp(0.93rem, 2.7vw, 1.02rem);
    }

    .search-wrap {
      position: relative;
      display: grid;
      gap: 8px;
      margin-top: 20px;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      color: var(--ink);
      outline: none;
      padding: 12px 14px;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .refresh-btn {
      border: 1px solid rgba(32, 33, 36, 0.2);
      border-radius: 10px;
      background: #ffffff;
      color: #2b3138;
      font-size: 0.9rem;
      padding: 8px 10px;
      cursor: pointer;
    }

    .refresh-btn:disabled {
      cursor: default;
      opacity: 0.6;
    }

    .list {
      list-style: none;
      margin: 16px 0 0;
      padding: 0;
      display: block;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }

    .item {
      margin: 0;
      padding: 11px 14px;
      line-height: 1.35;
      background: transparent;
      border-bottom: 1px solid rgba(32, 33, 36, 0.09);
    }

    .item:last-child {
      border-bottom: 0;
    }

    .empty {
      margin: 16px 0 0;
      border: 1px dashed rgba(32, 33, 36, 0.25);
      border-radius: 12px;
      background: #ffffff;
      color: var(--muted);
      padding: 14px;
      text-align: center;
    }

    .status {
      margin-top: 12px;
      color: #7e2e2e;
      font-size: 0.95rem;
    }

    .pill {
      border: 1px solid rgba(32, 33, 36, 0.18);
      color: #4f5661;
      background: #ffffff;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.83rem;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .page {
        width: 94vw;
        margin-top: 14px;
      }

      .hero {
        border-radius: 14px;
        padding: 14px;
      }

      .item {
        padding: 10px 12px;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

  <script>
    (function () {
      var searchInput = document.getElementById('search');
      var listEl = document.getElementById('list');
      var resultCountEl = document.getElementById('resultCount');
      var emptyEl = document.getElementById('empty');
      var statusEl = document.getElementById('status');
      var generatedAtEl = document.getElementById('generatedAt');
      var refreshCacheBtn = document.getElementById('refreshCacheBtn');
      var embeddedDataEl = document.getElementById('bluraysData');
      var titles = [];

      function normalize(value) {
        return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
      }

      function formatDate(isoDate) {
        if (!isoDate) return 'JSON: no timestamp';
        var d = new Date(isoDate);
        if (Number.isNaN(d.getTime())) return 'JSON: timestamp unavailable';
        return 'JSON: ' + d.toLocaleString('en-GB', { hour12: false });
      }

      function renderList(items) {
        listEl.innerHTML = '';

        if (!items.length) {
          emptyEl.hidden = false;
          return;
        }

        emptyEl.hidden = true;
        var frag = document.createDocumentFragment();
        for (var i = 0; i < items.length; i += 1) {
          var li = document.createElement('li');
          li.className = 'item';
          li.textContent = items[i];
          frag.appendChild(li);
        }
        listEl.appendChild(frag);
      }

      function applyFilter() {
        var query = normalize(searchInput.value);
        var filtered = !query
          ? titles
          : titles.filter(function (title) {
              return normalize(title).indexOf(query) !== -1;
            });

        renderList(filtered);
        resultCountEl.textContent = filtered.length + ' of ' + titles.length + ' titles';
      }

      function showError(message) {
        statusEl.style.color = '#7e2e2e';
        statusEl.textContent = message;
        resultCountEl.textContent = 'Could not load titles';
      }

      function showInfo(message) {
        statusEl.style.color = '#4f5661';
        statusEl.textContent = message;
      }

      function refreshCachedCopy() {
        if (!('serviceWorker' in navigator)) {
          showError('Service worker is not supported in this browser.');
          return;
        }

        refreshCacheBtn.disabled = true;
        showInfo('Refreshing cached copy...');

        Promise.all([
          fetch('/index.html', { cache: 'no-store' }).then(function (response) {
            if (!response.ok) {
              throw new Error('HTTP ' + response.status);
            }
          }),
          navigator.serviceWorker.getRegistration().then(function (registration) {
            if (registration) {
              return registration.update();
            }
          })
        ])
          .then(function () {
            showInfo('Cached copy updated. Reloading...');
            setTimeout(function () {
              window.location.reload();
            }, 350);
          })
          .catch(function (err) {
            showError('Refresh failed. (' + err.message + ')');
            refreshCacheBtn.disabled = false;
          });
      }

      function readEmbeddedData() {
        if (!embeddedDataEl) {
          throw new Error('Embedded data block not found');
        }

        var payload = embeddedDataEl.textContent || '';
        if (!payload.trim()) {
          throw new Error('Embedded data is empty');
        }

        return JSON.parse(payload);
      }

      function init() {
        try {
          var data = readEmbeddedData();
          titles = Array.isArray(data.titles) ? data.titles.slice() : [];
          titles.sort(function (a, b) {
            return String(a).localeCompare(String(b));
          });

          generatedAtEl.textContent = formatDate(data.generated_at_utc);
          statusEl.style.color = '';
          statusEl.textContent = '';
          applyFilter();
          searchInput.focus();
        } catch (err) {
          showError('Error reading embedded Blu-ray data. (' + err.message + ')');
        }
      }

      searchInput.addEventListener('input', applyFilter);
      refreshCacheBtn.addEventListener('click', refreshCachedCopy);
      init();
    })();
  </script>

      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function (err) {
          console.log('Service worker registration failed:', err);
        });
      });
    }
  </script>
